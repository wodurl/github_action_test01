# test01/.github/workflows/deploy.yml

name: "Terraform & Ansible CI/CD"
on:
  push:
    branches: ["master"] # master 브랜치에 푸시가 될 때마다 실행하겠다는 의미
jobs:
  deploy:
    runs-on: ubuntu-latest # 최신 ubuntu machine을 잠시 사용하여 아래의 작업을 수행하겠다는 의미
    # ubuntu machine의 환경 변수에 넣어줄 값을 셋팅하는 설정
    # 우리가 mgmt 서버에 aws configure를 실행해서 키를 등록했듯 1회용 ubuntu 서버에서 동일한 작업을 해준다.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} # 이게 동작하기 위해서는 guthub에 secrets가 등록되어 있어야 한다.
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v5

      # 2. terraform 환경 구성
      - name: setup Terraform
        uses: hashicorp/setup-terraform@v4

      # 3. init & apply 실행
      - name: terraform init & apply
        run: |
          terraform init
          terraform apply --auto-approve

      # 4. ansible 용 key setting
      - name: setup ssh key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 5. ansible playbook 실행
      - name: run asnible playbook
        run: |